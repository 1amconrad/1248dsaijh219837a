<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SUA EMPRESA AQUI</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="bg-slate-50 text-slate-900">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // --- CONFIGURAÇÃO ---
        const SUPABASE_URL = 'https://cbddqpnpumxuxskmgxiq.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImNiZGRxcG5wdW14dXhza21neGlxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUyMDIyOTEsImV4cCI6MjA5MDc3ODI5MX0._skePv3tfM8WGp5kENT17aRW25Bbi5LFSbiHDIP78No';
        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        // --- COMPONENTE: ESTOQUE ---
        function Inventory({ user }) {
            const [items, setItems] = useState([]);
            const [form, setForm] = useState({ item_name: '', quantity: '', price: '' });

            const fetchInventory = async () => {
                const { data } = await supabase.from('inventory').select('*').order('item_name');
                setItems(data || []);
            };

            useEffect(() => { fetchInventory(); }, []);

            const handleAdd = async (e) => {
                e.preventDefault();
                await supabase.from('inventory').insert([{ ...form, user_id: user.id }]);
                setForm({ item_name: '', quantity: '', price: '' });
                fetchInventory();
            };

            return (
                <div>
                    <h2 class="text-2xl font-bold mb-6">Controle de Estoque</h2>
                    <form onSubmit={handleAdd} class="bg-white p-4 rounded-xl shadow-sm mb-6 flex gap-4 items-end">
                        <input placeholder="Produto" class="border p-2 rounded w-full" value={form.item_name} onChange={e => setForm({...form, item_name: e.target.value})} required />
                        <input placeholder="Qtd" type="number" class="border p-2 rounded w-24" value={form.quantity} onChange={e => setForm({...form, quantity: e.target.value})} />
                        <input placeholder="Preço" type="number" step="0.01" class="border p-2 rounded w-32" value={form.price} onChange={e => setForm({...form, price: e.target.value})} />
                        <button class="bg-blue-600 text-white px-4 py-2 rounded">Adicionar</button>
                    </form>
                    <div class="bg-white rounded-xl shadow-sm overflow-hidden">
                        <table class="w-full text-left">
                            <thead class="bg-slate-100">
                                <tr><th class="p-4">Item</th><th class="p-4">Qtd</th><th class="p-4">Preço Un.</th></tr>
                            </thead>
                            <tbody>
                                {items.map(i => (
                                    <tr key={i.id} class="border-t">
                                        <td class="p-4">{i.item_name}</td>
                                        <td class="p-4">{i.quantity}</td>
                                        <td class="p-4">R$ {Number(i.price).toFixed(2)}</td>
                                    </tr>
                                ))}
                            </tbody>
                        </table>
                    </div>
                </div>
            );
        }

        // --- COMPONENTE: CALENDÁRIO ---
        function Calendar({ user }) {
            const [events, setEvents] = useState([]);
            const [form, setForm] = useState({ title: '', event_date: '', type: 'Nota' });

            const fetchEvents = async () => {
                const { data } = await supabase.from('calendar_events').select('*').order('event_date');
                setEvents(data || []);
            };

            useEffect(() => { fetchEvents(); }, []);

            const handleAdd = async (e) => {
                e.preventDefault();
                await supabase.from('calendar_events').insert([{ ...form, user_id: user.id }]);
                fetchEvents();
            };

            return (
                <div>
                    <h2 class="text-2xl font-bold mb-6">Notas e Anúncios</h2>
                    <form onSubmit={handleAdd} class="bg-white p-4 rounded-xl shadow-sm mb-6 flex gap-4 items-end">
                        <input placeholder="Título/Descrição" class="border p-2 rounded w-full" value={form.title} onChange={e => setForm({...form, title: e.target.value})} required />
                        <input type="date" class="border p-2 rounded" value={form.event_date} onChange={e => setForm({...form, event_date: e.target.value})} required />
                        <select class="border p-2 rounded" value={form.type} onChange={e => setForm({...form, type: e.target.value})}>
                            <option>Nota</option>
                            <option>Anúncio</option>
                        </select>
                        <button class="bg-indigo-600 text-white px-4 py-2 rounded">Agendar</button>
                    </form>
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                        {events.map(ev => (
                            <div key={ev.id} class={`p-4 rounded-lg border-l-4 shadow-sm bg-white ${ev.type === 'Anúncio' ? 'border-orange-500' : 'border-blue-500'}`}>
                                <div class="flex justify-between items-start">
                                    <span class="text-xs font-bold uppercase text-gray-400">{ev.type}</span>
                                    <span class="text-xs text-gray-500">{ev.event_date}</span>
                                </div>
                                <p class="font-semibold mt-1">{ev.title}</p>
                            </div>
                        ))}
                    </div>
                </div>
            );
        }

        // --- COMPONENTE: CATEGORIAS ---
        function Categories({ user }) {
            const [cats, setCats] = useState([]);
            const [name, setName] = useState('');

            const fetchCats = async () => {
                const { data } = await supabase.from('categories').select('*');
                setCats(data || []);
            };

            useEffect(() => { fetchCats(); }, []);

            const addCat = async () => {
                await supabase.from('categories').insert([{ name, user_id: user.id }]);
                setName(''); fetchCats();
            };

            return (
                <div class="max-w-md">
                    <h2 class="text-2xl font-bold mb-6">Categorias de Venda</h2>
                    <div class="flex gap-2 mb-6">
                        <input placeholder="Ex: Produto Físico, Serviço..." class="border p-2 rounded flex-1" value={name} onChange={e => setName(e.target.value)} />
                        <button onClick={addCat} class="bg-green-600 text-white px-4 py-2 rounded">Criar</button>
                    </div>
                    <ul class="bg-white rounded-xl shadow-sm">
                        {cats.map(c => <li key={c.id} class="p-4 border-b last:border-0">{c.name}</li>)}
                    </ul>
                </div>
            );
        }

        // --- COMPONENTE: VENDAS (ATUALIZADO) ---
        function Sales({ user }) {
            const [sales, setSales] = useState([]);
            const [cats, setCats] = useState([]);
            const [form, setForm] = useState({ category_id: '', amount: '', description: '' });

            const fetchData = async () => {
                const { data: s } = await supabase.from('sales').select('*, categories(name)').order('created_at', {ascending: false});
                const { data: c } = await supabase.from('categories').select('*');
                setSales(s || []); setCats(c || []);
            };

            useEffect(() => { fetchData(); }, []);

            const handleSale = async (e) => {
                e.preventDefault();
                await supabase.from('sales').insert([{ ...form, user_id: user.id }]);
                setForm({ category_id: '', amount: '', description: '' });
                fetchData();
            };

            return (
                <div>
                    <h2 class="text-2xl font-bold mb-6">Registrar Venda</h2>
                    <form onSubmit={handleSale} class="bg-white p-6 rounded-xl shadow-sm mb-8 flex gap-4 items-end">
                        <div class="flex-1">
                            <label class="text-xs text-gray-500">Categoria</label>
                            <select class="w-full border p-2 rounded mt-1" value={form.category_id} onChange={e => setForm({...form, category_id: e.target.value})} required>
                                <option value="">Escolha...</option>
                                {cats.map(c => <option key={c.id} value={c.id}>{c.name}</option>)}
                            </select>
                        </div>
                        <div class="w-40">
                            <label class="text-xs text-gray-500">Valor (R$)</label>
                            <input type="number" step="0.01" class="w-full border p-2 rounded mt-1" value={form.amount} onChange={e => setForm({...form, amount: e.target.value})} required />
                        </div>
                        <div class="flex-[2]">
                            <label class="text-xs text-gray-500">Observação</label>
                            <input class="w-full border p-2 rounded mt-1" value={form.description} onChange={e => setForm({...form, description: e.target.value})} />
                        </div>
                        <button class="bg-blue-600 text-white px-6 py-2 rounded h-[42px]">Vender</button>
                    </form>

                    <div class="bg-white rounded-xl shadow-sm overflow-hidden">
                        <table class="w-full text-left">
                            <thead class="bg-slate-100">
                                <tr><th class="p-4">Data</th><th class="p-4">Categoria</th><th class="p-4">Obs</th><th class="p-4">Valor</th></tr>
                            </thead>
                            <tbody>
                                {sales.map(s => (
                                    <tr key={s.id} class="border-t">
                                        <td class="p-4 text-sm">{new Date(s.created_at).toLocaleDateString()}</td>
                                        <td class="p-4 font-medium">{s.categories?.name || 'Sem Categoria'}</td>
                                        <td class="p-4 text-gray-500">{s.description}</td>
                                        <td class="p-4 font-bold text-green-600">R$ {Number(s.amount).toFixed(2)}</td>
                                    </tr>
                                ))}
                            </tbody>
                        </table>
                    </div>
                </div>
            );
        }

        // --- APP PRINCIPAL ---
        function App() {
            const [user, setUser] = useState(null);
            const [route, setRoute] = useState('sales');

            useEffect(() => {
                supabase.auth.getSession().then(({ data: { session } }) => setUser(session?.user ?? null));
            }, []);

            if (!user) return (
                <div class="h-screen flex items-center justify-center">
                    <button onClick={async () => {
                        const email = prompt("Email:"); const password = prompt("Senha:");
                        const { data } = await supabase.auth.signInWithPassword({ email, password });
                        if(data.user) setUser(data.user);
                    }} class="bg-blue-600 text-white px-8 py-3 rounded-lg font-bold">Entrar no CRM</button>
                </div>
            );

            return (
                <div class="flex h-screen">
                    <aside class="w-64 bg-slate-900 text-white p-6 flex flex-col">
                        <h1 class="text-xl font-bold mb-8 text-blue-400">Meu Business</h1>
                        <nav class="flex-1 space-y-2">
                            <button onClick={() => setRoute('sales')} class={`w-full text-left p-3 rounded ${route === 'sales' ? 'bg-blue-600' : 'hover:bg-slate-800'}`}><i class="fas fa-cash-register mr-2"></i> Vendas</button>
                            <button onClick={() => setRoute('categories')} class={`w-full text-left p-3 rounded ${route === 'categories' ? 'bg-blue-600' : 'hover:bg-slate-800'}`}><i class="fas fa-tags mr-2"></i> Categorias</button>
                            <button onClick={() => setRoute('inventory')} class={`w-full text-left p-3 rounded ${route === 'inventory' ? 'bg-blue-600' : 'hover:bg-slate-800'}`}><i class="fas fa-box mr-2"></i> Estoque</button>
                            <button onClick={() => setRoute('calendar')} class={`w-full text-left p-3 rounded ${route === 'calendar' ? 'bg-blue-600' : 'hover:bg-slate-800'}`}><i class="fas fa-calendar-alt mr-2"></i> Calendário</button>
                        </nav>
                        <button onClick={() => supabase.auth.signOut().then(() => setUser(null))} class="text-slate-400 text-sm hover:text-white mt-4">Sair</button>
                    </aside>
                    <main class="flex-1 p-8 overflow-y-auto">
                        {route === 'sales' && <Sales user={user} />}
                        {route === 'categories' && <Categories user={user} />}
                        {route === 'inventory' && <Inventory user={user} />}
                        {route === 'calendar' && <Calendar user={user} />}
                    </main>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
